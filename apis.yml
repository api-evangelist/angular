description: >-
  Angular is an open-source TypeScript-based web application framework maintained
  by Google and a community of contributors. It provides a comprehensive platform
  for building single-page applications with a component-based architecture,
  reactive Signals, deferrable views, built-in control flow, zoneless change
  detection, server-side rendering, and the Angular CLI. Angular follows a major
  release cadence of two versions per year.
